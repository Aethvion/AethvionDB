<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AethvionDB</title>
<style>
  :root {
    --bg: #0e1116; --panel: #161b22; --panel2: #1c2230; --border: #2a3240;
    --text: #e6edf3; --muted: #8b97a7; --accent: #4f9cff; --accent2: #6ee7b7;
    --chip: #233044;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
         background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
  header { display: flex; align-items: center; gap: 14px; padding: 12px 18px;
           border-bottom: 1px solid var(--border); background: var(--panel); }
  header h1 { font-size: 16px; margin: 0; font-weight: 700; letter-spacing: .3px; }
  header .ver { color: var(--muted); font-size: 12px; }
  header .spacer { flex: 1; }
  select, input, button { font: inherit; color: var(--text); background: var(--panel2);
           border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; outline: none; }
  select:focus, input:focus { border-color: var(--accent); }
  button { cursor: pointer; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #06101f; font-weight: 600; }
  button.primary:hover { filter: brightness(1.08); }
  .wrap { flex: 1; display: grid; grid-template-columns: 380px 1fr; min-height: 0; }
  .list { border-right: 1px solid var(--border); display: flex; flex-direction: column; min-height: 0; }
  .list .controls { display: flex; gap: 8px; padding: 10px; border-bottom: 1px solid var(--border); }
  .list .controls input { flex: 1; }
  .rows { overflow-y: auto; flex: 1; }
  .row { padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .row:hover { background: var(--panel); }
  .row.active { background: var(--panel2); border-left: 2px solid var(--accent); }
  .row .name { font-weight: 600; font-size: 14px; }
  .row .meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .badge { display: inline-block; font-size: 11px; padding: 1px 7px; border-radius: 999px;
           background: var(--chip); color: var(--accent2); margin-right: 6px; }
  .detail { overflow-y: auto; padding: 18px 22px; }
  .detail h2 { margin: 0 0 4px; font-size: 18px; }
  .detail .sub { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
  .detail pre { background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
                padding: 14px; overflow-x: auto; font-size: 12.5px; line-height: 1.5; }
  .empty { color: var(--muted); padding: 40px; text-align: center; }
  .countbar { padding: 8px 14px; color: var(--muted); font-size: 12px; border-bottom: 1px solid var(--border); }
  dialog { background: var(--panel); color: var(--text); border: 1px solid var(--border);
           border-radius: 12px; padding: 0; width: 360px; }
  dialog form { padding: 18px; display: flex; flex-direction: column; gap: 10px; }
  dialog h3 { margin: 0 0 4px; }
  dialog .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 6px; }
  label { font-size: 12px; color: var(--muted); }
</style>
</head>
<body>
  <header>
    <h1>Aethvion<span style="color:var(--accent)">DB</span></h1>
    <span class="ver" id="ver"></span>
    <span class="spacer"></span>
    <select id="dbSel" title="Database"></select>
    <button class="primary" id="newBtn">+ Entity</button>
  </header>

  <div class="wrap">
    <div class="list">
      <div class="controls">
        <input id="search" placeholder="Filter by name…" autocomplete="off">
        <button id="reload" title="Reload">↻</button>
      </div>
      <div class="countbar" id="countbar">—</div>
      <div class="rows" id="rows"></div>
    </div>
    <div class="detail" id="detail">
      <div class="empty">Select an entity to view it.</div>
    </div>
  </div>

  <dialog id="newDlg">
    <form method="dialog" id="newForm">
      <h3>New entity</h3>
      <label>Name</label>
      <input id="nName" required autocomplete="off">
      <label>Type</label>
      <input id="nType" value="concept" autocomplete="off">
      <div class="actions">
        <button value="cancel">Cancel</button>
        <button class="primary" id="nCreate" value="default">Create</button>
      </div>
    </form>
  </dialog>

<script>
const API = "/api/v1";
let entities = [];
let activeId = null;

async function jget(url, opts) {
  const r = await fetch(url, opts);
  const j = await r.json().catch(() => ({}));
  if (!r.ok || j.ok === false) throw new Error((j.detail) || ("HTTP " + r.status));
  return j.data;
}
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

async function loadDatabases() {
  const d = await jget(`${API}/`);
  document.getElementById("ver").textContent = d.version;
  const sel = document.getElementById("dbSel");
  sel.innerHTML = "";
  const dbs = d.databases.length ? d.databases : [{name: "default", entity_count: 0}];
  for (const db of dbs) {
    const o = document.createElement("option");
    o.value = db.name; o.textContent = `${db.name} (${db.entity_count})`;
    sel.appendChild(o);
  }
  await loadEntities();
}

async function loadEntities() {
  const db = document.getElementById("dbSel").value;
  const d = await jget(`${API}/${encodeURIComponent(db)}/raw/entities?limit=500`);
  entities = d.entities || [];
  document.getElementById("countbar").textContent =
    `${d.total ?? entities.length} entities` + (d.total > entities.length ? ` (showing ${entities.length})` : "");
  render();
}

function render() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  const rows = document.getElementById("rows");
  const list = q ? entities.filter(e => (e.name || e.id || "").toLowerCase().includes(q)) : entities;
  if (!list.length) { rows.innerHTML = `<div class="empty">No entities.</div>`; return; }
  rows.innerHTML = list.map(e => `
    <div class="row ${e.id === activeId ? "active" : ""}" data-id="${esc(e.id)}">
      <div class="name">${esc(e.name || e.id)}</div>
      <div class="meta"><span class="badge">${esc(e.type || "other")}</span>${esc(e.status || "")}</div>
    </div>`).join("");
  rows.querySelectorAll(".row").forEach(r =>
    r.addEventListener("click", () => showEntity(r.dataset.id)));
}

async function showEntity(id) {
  activeId = id; render();
  const db = document.getElementById("dbSel").value;
  const detail = document.getElementById("detail");
  detail.innerHTML = `<div class="empty">Loading…</div>`;
  try {
    const e = await jget(`${API}/${encodeURIComponent(db)}/raw/entities/${encodeURIComponent(id)}`);
    const core = (e.sections && e.sections.core) || {};
    detail.innerHTML = `
      <h2>${esc(e.name || e.id)}</h2>
      <div class="sub"><span class="badge">${esc(e.type || "other")}</span>
        ${esc(e.kind || "")} · ${esc(e.status || "")} · v${esc(e.version || 1)} · ${esc(e.id)}</div>
      ${core.summary ? `<p>${esc(core.summary)}</p>` : ""}
      <pre>${esc(JSON.stringify(e, null, 2))}</pre>`;
  } catch (err) {
    detail.innerHTML = `<div class="empty">Error: ${esc(err.message)}</div>`;
  }
}

async function createEntity(name, type) {
  const db = document.getElementById("dbSel").value;
  await jget(`${API}/${encodeURIComponent(db)}/raw/entities/upsert`, {
    method: "POST", headers: {"Content-Type": "application/json"},
    body: JSON.stringify({name, type}),
  });
  await loadEntities();
}

document.getElementById("dbSel").addEventListener("change", loadEntities);
document.getElementById("reload").addEventListener("click", loadEntities);
document.getElementById("search").addEventListener("input", render);
document.getElementById("newBtn").addEventListener("click", () => document.getElementById("newDlg").showModal());
document.getElementById("newForm").addEventListener("submit", (ev) => {
  if (ev.submitter && ev.submitter.value === "cancel") return;
  const name = document.getElementById("nName").value.trim();
  const type = document.getElementById("nType").value.trim() || "concept";
  if (name) createEntity(name, type).catch(e => alert(e.message));
  document.getElementById("nName").value = "";
});

loadDatabases().catch(e => {
  document.getElementById("detail").innerHTML = `<div class="empty">Failed to load: ${esc(e.message)}</div>`;
});
</script>
</body>
</html>
